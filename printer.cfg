# =========================
# PRINTER CONFIG
# Printrbot Simple Pro
# BTT SKR Pico + Raspberry Pi + Klipper
# =========================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXXXXXXXXXXXXX

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 1800
max_z_velocity: 10
max_z_accel: 80

# =========================
# X AXIS
# =========================

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio4
position_endstop: 0
position_max: 200
homing_speed: 50

# =========================
# Y AXIS
# =========================

[stepper_y]
step_pin: gpio6
dir_pin: !gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio3
position_endstop: 150
position_max: 150
homing_speed: 50

# =========================
# Z AXIS
# =========================

[stepper_z]
step_pin: gpio19
dir_pin: gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 200

# =========================
# EXTRUDER
# =========================

[extruder]
step_pin: gpio14
dir_pin: gpio13
enable_pin: !gpio15
microsteps: 16
rotation_distance: 25.6
nozzle_diameter: 0.300
filament_diameter: 1.750
heater_pin: gpio21
sensor_type: EPCOS 100K B57560G104F
sensor_pin: gpio26
control: pid
pid_kp: 39.042
pid_ki: 4.820
pid_kd: 79.061
min_temp: 0
max_temp: 280

# =========================
# HEATER SAFETY (important)
# =========================

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 5
heating_gain: 2

# =========================
# FANS
# =========================

# Part cooling fan
[fan]
pin: gpio17

# Hotend cooling fan (auto)
[heater_fan hotend_fan]
pin: gpio18
heater: extruder
heater_temp: 45.0

# =========================
# BLTOUCH
# =========================

[bltouch]
sensor_pin: ^gpio22
control_pin: gpio20
x_offset: -25
y_offset: -10
z_offset: 0

[safe_z_home]
home_xy_position: 100,75
speed: 50
z_hop: 10
z_hop_speed: 5

# =========================
# BED MESH
# =========================

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10,10
mesh_max: 180,140
probe_count: 5,5

# =========================
# START PRINT MACRO
# =========================

[gcode_macro START_PRINT]
gcode:
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}

  G90
  M83

  M104 S{EXTRUDER_TEMP}
  M109 S{EXTRUDER_TEMP}

  G28
  BED_MESH_PROFILE LOAD=default

  G1 Z5 F3000
  G1 X5 Y5 F6000
  G1 Z0.3 F1000
  G1 X5 Y140 E10 F1000
  G1 X6 Y140 F6000
  G1 X6 Y5 E10 F1000

  G92 E0
  G1 Z2 F1200

# =========================
# END PRINT MACRO
# =========================

[gcode_macro END_PRINT]
gcode:
  M104 S0
  M140 S0
  G91
  G1 E-2 F2700
  G1 Z10 F3000
  G90
  G1 X0 Y150 F6000
  M106 S0

# =========================
# ARC SUPPORT (important)
# =========================

[gcode_arcs]
resolution: 0.1
