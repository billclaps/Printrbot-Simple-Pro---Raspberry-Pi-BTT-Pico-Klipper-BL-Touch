# =========================
# PRINTER CONFIG
# Printrbot Simple Pro
# BTT SKR Pico + Raspberry Pi + Klipper
# =========================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXXXXXXXXXXXXX

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 1800
max_z_velocity: 10
max_z_accel: 80
square_corner_velocity: 5.0

# --------------------
# X Axis
# --------------------
[stepper_x]
step_pin: gpio11
dir_pin: gpio10
enable_pin: !gpio12
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio4
position_endstop: 0
position_max: 200
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 0.70
stealthchop_threshold: 0

# --------------------
# Y Axis
# --------------------
[stepper_y]
step_pin: gpio6
dir_pin: gpio5
enable_pin: !gpio7
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpio3
position_endstop: 150
position_max: 150
homing_positive_dir: true
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
run_current: 0.70
stealthchop_threshold: 0

# --------------------
# Z Axis
# --------------------
[stepper_z]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 200
homing_speed: 8
second_homing_speed: 3

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 0.65
stealthchop_threshold: 0

# --------------------
# Extruder
# --------------------
[extruder]
step_pin: gpio14
dir_pin: !gpio13
enable_pin: !gpio15
microsteps: 16
rotation_distance: 25.0
nozzle_diameter: 0.300
filament_diameter: 1.750

heater_pin: gpio23
sensor_pin: gpio27
sensor_type: EPCOS 100K B57560G104F

#control: pid
#pid_kp: 21.5
#pid_ki: 1.06
#pid_kd: 109.0

min_temp: 0
max_temp: 285
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 3
run_current: 0.80
stealthchop_threshold: 0

# --------------------
# Bed
# --------------------
#[heater_bed]
#heater_pin: gpio21
#sensor_pin: gpio26
#sensor_type: EPCOS 100K B57560G104F
#control: pid
#pid_kp: 54.0
#pid_ki: 0.77
#pid_kd: 948.0
#min_temp: 0
#max_temp: 110

# --------------------
# Fans
# --------------------
[fan]
pin: gpio17

[heater_fan hotend_fan]
pin: gpio18
heater: extruder
heater_temp: 45.0

# --------------------
# BLTouch
# --------------------
[bltouch]
sensor_pin: ^gpio22
control_pin: gpio29
x_offset: 20
y_offset: 0
z_offset: 3.199
speed: 8
samples: 2
sample_retract_dist: 3.0

# --------------------
# Safe homing
# --------------------
[safe_z_home]
home_xy_position: 80,75
speed: 50
z_hop: 10
z_hop_speed: 10

# --------------------
# Bed mesh
# --------------------
[bed_mesh]
speed: 100
horizontal_move_z: 8
mesh_min: 25,10
mesh_max: 175,140
probe_count: 5,5
algorithm: bicubic

# --------------------
# Optional screws helper
# --------------------
[screws_tilt_adjust]
screw1: 15,15
screw1_name: front_left
screw2: 185,15
screw2_name: front_right
screw3: 185,135
screw3_name: rear_right
screw4: 15,135
screw4_name: rear_left
horizontal_move_z: 8
speed: 100

# --------------------
# Marlin compatibility
# --------------------
[gcode_macro M290]
description: Babystepping (Marlin compatibility)
gcode:
  {% set z = params.Z|default(0)|float %}
  SET_GCODE_OFFSET Z_ADJUST={z} MOVE=1

# --------------------
# Misc
# --------------------

[gcode_arcs]
resolution: 0.1

[pause_resume]

[idle_timeout]
timeout: 900

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes

# --------------------
# Convenience aliases
# --------------------
[gcode_macro G29]
gcode:
  BED_MESH_CALIBRATE

# --------------------
# Start Print
# --------------------

[gcode_macro START_PRINT]
gcode:
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}

  G90
  M83

  M104 S{EXTRUDER_TEMP}
  M109 S{EXTRUDER_TEMP}

  G28
  BED_MESH_PROFILE LOAD=default

  G1 Z5 F3000
  G1 X5 Y5 F6000
  G1 Z0.3 F1000
  G1 X5 Y140 E10 F1000
  G1 X6 Y140 F6000
  G1 X6 Y5 E10 F1000

  G92 E0
  G1 Z2 F1200

# --------------------
# End Print
# --------------------
[gcode_macro END_PRINT]
gcode:
  M400
  TURN_OFF_HEATERS
  M107
  G91
  G1 Z10 E-2 F1200
  G90
  G1 X10 Y140 F6000
  M84

# --------------------
# Cancel Print
# --------------------
[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
  M400
  TURN_OFF_HEATERS
  M107
  G91
  G1 Z10 F1200
  G90
  G1 X10 Y140 F6000
  CANCEL_PRINT_BASE

# --------------------
# Pause / Resume
# --------------------
[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  G91
  G1 Z10 F1200
  G90
  G1 X10 Y140 F6000

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
  RESUME_BASE

# =========================
# IGNORE UNUSED BED COMMANDS
# =========================

[gcode_macro M140]
gcode:
  # Ignore set bed temp (no heated bed installed)

[gcode_macro M190]
gcode:
  # Ignore wait for bed temp
